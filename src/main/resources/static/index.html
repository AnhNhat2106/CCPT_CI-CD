<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu bản thân - Thai Anh Nhat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a4a 100%);
            color: #ffffff;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            max-width: 600px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(100, 100, 255, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        .container:hover {
            transform: translateY(-10px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        .container:hover::before {
            opacity: 1;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            font-weight: 800;
        }

        h1 {
            margin: 0 0 0.5rem;
            font-size: 2.5rem;
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            margin: 0 0 1.5rem;
            font-size: 1.2rem;
            font-weight: 300;
            color: #a0aec0;
        }

        p {
            line-height: 1.6;
            color: #cbd5e0;
            margin-bottom: 2rem;
        }

        .skills {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 2rem;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .skill-tag:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            color: #4facfe;
            border-color: rgba(79, 172, 254, 0.5);
        }

        .docker-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
            padding: 10px 20px;
            background: rgba(36, 150, 237, 0.15);
            border: 1px solid rgba(36, 150, 237, 0.4);
            border-radius: 12px;
            color: #2496ed;
            font-weight: 600;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(36, 150, 237, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(36, 150, 237, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(36, 150, 237, 0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="avatar">👨‍💻</div>
        <h1>Chào bạn! Mình là Thái Anh Nhật</h1>
        <h2>Sinh viên CNTT - Hutech🚀</h2>
        <p>
            Chào mừng bạn đến với trang giới thiệu bản thân của mình!
            Đây là bài tập ứng dụng web sử dụng Spring Boot được đóng gói và chạy thành công trên nền tảng Docker.
        </p>

        <div class="skills">
            <div class="skill-tag">Java</div>
            <div class="skill-tag">Spring Boot</div>
            <div class="skill-tag">Docker</div>
            <div class="skill-tag">HTML/CSS</div>
        </div>
