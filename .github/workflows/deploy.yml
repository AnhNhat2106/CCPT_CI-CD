name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Bước 1: Kéo (Checkout) code từ GitHub repository báo về hệ thống
      - name: Checkout Code
        uses: actions/checkout@v4

      # Bước 2: Đăng nhập vào Docker Hub sử dụng biến bí mật (Secrets)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 3: Tự động Build từ Dockerfile và Push Image lên Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-java-app:latest
